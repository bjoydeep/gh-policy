# Template for adding new managed hubs
# Copy this file and replace MANAGED_HUB_NAME with actual hub name

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: MANAGED_HUB_NAME-cluster-policies
  namespace: openshift-gitops
  labels:
    app: global-hub-policies
    target-hub: MANAGED_HUB_NAME
spec:
  project: default
  source:
    repoURL: https://github.com/bjoydeep/gh-policy.git
    targetRevision: main
    path: cluster-policies/base  # Or use overlays/production-clusters
  destination:
    name: MANAGED_HUB_NAME  # Replace with actual managed hub name
    namespace: gh-policy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m