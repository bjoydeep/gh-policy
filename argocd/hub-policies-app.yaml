apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-policies
  namespace: openshift-gitops
  labels:
    app: global-hub-policies
    target: global-hub
spec:
  project: default
  source:
    repoURL: https://github.com/bjoydeep/gh-policy.git
    targetRevision: main
    path: hub-policies/base
  destination:
    server: https://kubernetes.default.svc  # Deploy to Global Hub itself
    namespace: hub-policies
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m