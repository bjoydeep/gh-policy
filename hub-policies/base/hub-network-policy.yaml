apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: hub-network-policy
  namespace: hub-policies
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
  - objectDefinition:
      apiVersion: policy.open-cluster-management.io/v1
      kind: ConfigurationPolicy
      metadata:
        name: hub-network-policy-config
      spec:
        remediationAction: enforce
        severity: medium
        object-templates:
        - complianceType: musthave
          objectDefinition:
            apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: deny-all-ingress
              namespace: open-cluster-management-agent
            spec:
              podSelector: {}
              policyTypes:
              - Ingress