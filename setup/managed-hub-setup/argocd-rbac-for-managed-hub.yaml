# RBAC for ArgoCD on managed hubs
# This needs to be applied ON THE MANAGED HUB (mh-01)
# to allow ArgoCD (via cluster-proxy) to create ManagedClusterSetBindings

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-managed-hub-policy-manager
rules:
- apiGroups:
  - policy.open-cluster-management.io
  resources:
  - policies
  - placementbindings
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
  - delete
- apiGroups:
  - cluster.open-cluster-management.io
  resources:
  - placements
  - placementdecisions
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
  - delete
- apiGroups:
  - cluster.open-cluster-management.io
  resources:
  - managedclusters
  - managedclustersets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cluster.open-cluster-management.io
  resources:
  - managedclustersets/bind
  verbs:
  - create
- apiGroups:
  - cluster.open-cluster-management.io
  resources:
  - managedclustersetbindings
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-managed-hub-policy-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-managed-hub-policy-manager
subjects:
- kind: User
  name: system:open-cluster-management:cluster:mh-01:addon:application-manager:agent:application-manager
  apiGroup: rbac.authorization.k8s.io