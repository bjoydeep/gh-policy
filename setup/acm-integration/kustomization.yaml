apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ACM-ArgoCD Integration Resources
# Deploy these BEFORE deploying the ArgoCD application

resources:
- managedclustersetbinding.yaml
- gitops-cluster.yaml
- argocd-rbac.yaml

# Target namespace for these resources
namespace: openshift-gitops

# Add common metadata
commonLabels:
  component: acm-argocd-integration
  managed-by: global-hub